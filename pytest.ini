[pytest]
# Tell pytest where to find our tests
testpaths = tests

# --cov=src        → measure coverage for everything under src/
# --cov-report=term-missing → print a table in the terminal showing
#                             which line numbers haven't been hit by any test
addopts = --cov=src --cov-report=term-missing

# Limit OpenBLAS and OpenMP to a single thread per process.
# Without this, scikit-learn/numpy try to spawn multiple BLAS threads and
# exhaust memory on this Windows machine when many test files are collected.
# Set to 1 here so every pytest run gets the same safe default automatically.
[env]
OPENBLAS_NUM_THREADS = 1
OMP_NUM_THREADS = 1
